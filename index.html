function generateNavonHTML(global_letter, local_letter){
  let html = '<div class="navon-container">';
  const template = TEMPLATES[global_letter];
  const colors = ["white", "yellow", "cyan", "magenta", "lime"];
  for(let r=0; r<GRID_SIZE; r++){
    html += '<div style="white-space: nowrap;">';
    for(let c=0; c<GRID_SIZE; c++){
      if(template[r][c] === 1){
        const color = colors[Math.floor(Math.random()*colors.length)];
        html += `<span class="navon-letter" style="color:${color}">${local_letter}</span>`;
      } else {
        html += `<span class="navon-letter">&nbsp;</span>`;
      }
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function instructionScreen(htmlText){

  let fixedText = IS_MOBILE 
    ? htmlText
        .replace(/Nospied SPACE, lai turpinātu/g, "Nospied pogu zemāk, lai turpinātu")
        .replace(/Nospied SPACE, lai sāktu/g, "Nospied pogu zemāk, lai sāktu")
    : htmlText;

  return IS_MOBILE
    ? {
        type: "html-button-response",
        stimulus: `
          <div class="card">
            ${fixedText}
            <button class="jspsych-btn mobile-btn" style="margin-top:20px;">
              TURPINĀT
            </button>
          </div>
        `,
        choices: [],
        data: { ignore: true }
      }
    : {
        type: "html-keyboard-response",
        stimulus: fixedText,
        choices: [" "],
        data: { ignore: true }
      };
}

function createTrials(block_type, n_trials, fixed_task=null, letter_set){
  const trials = [];
  for(let i=0;i<n_trials;i++){
    let task = (block_type === "mixed") ? (Math.random() < 0.5 ? "global" : "local") : (fixed_task ?? block_type);
    let condition = Math.random()<0.5 ? "congruent" : "incongruent";
    let global_letter, local_letter;
    
    if(condition==="congruent"){
      global_letter = local_letter = letter_set[Math.floor(Math.random()*2)];
    } else {
      const shuffled = [...letter_set].sort(()=>Math.random()-0.5);
      global_letter = shuffled[0];
      local_letter  = shuffled[1];
    }
    
    if(block_type==="mixed"){
      const cue = task==="global" ? "↑" : "↓";
      trials.push(
        IS_MOBILE
        ? {
            type: "html-button-response",
            stimulus: `<div style="font-size:80px; color:yellow;">${cue}</div>`,
            choices: [],
            trial_duration: 700,
            data: {ignore:true}
          }
        : {
            type: "html-keyboard-response",
            stimulus: `<div style="font-size:80px; color:yellow;">${cue}</div>`,
            choices: jsPsych.NO_KEYS,
            trial_duration: 700,
            data: {ignore:true}
          }
      );
    }
    
    trials.push(
      IS_MOBILE
      ? {
          type: "html-button-response",
          stimulus: generateNavonHTML(global_letter, local_letter),
          choices: letter_set,
          button_html: `<button class="jspsych-btn mobile-btn">%choice%</button>`,
          trial_duration: 1500,
          data: {block:block_type, trial:i+1, condition, task, global_letter, local_letter},
          on_finish: function(data){
            const correct = (task==="global" ? global_letter : local_letter);
            if (data.response === null || data.response === undefined) {
              data.response = null; 
              data.correct = 0; 
            } else {
              let selectedVal = letter_set[parseInt(data.response)];
              data.response = selectedVal;
              data.correct = (selectedVal === correct) ? 1 : 0;
            }
          }
        }
      : {
          type: "html-keyboard-response",
          stimulus: generateNavonHTML(global_letter, local_letter),
          choices: letter_set.map(l => l.toLowerCase()),
          trial_duration: 1500,
          data: {block:block_type, trial:i+1, condition, task, global_letter, local_letter},
          on_finish: function(data){
            const correct = (task==="global"?global_letter:local_letter).toLowerCase();
            if (data.response === null) {
              data.correct = 0;
            } else {
              data.correct = (data.response === correct) ? 1 : 0;
            }
          }
        }
    );
  }
  return trials;
}

function saveData() {

  const columns = [
    "participant_id",
    "timestamp",
    "device",
    "age",
    "gender",
    "employment_status",
    "industry",
    "gaming",
    "block",
    "trial",
    "condition",
    "task",
    "global_letter",
    "local_letter",
    "response",
    "correct",
    "rt"
  ];

  const rows = jsPsych.data.get()
  .filterCustom(d =>

    !d.ignore &&

    d.trial_type !== "survey-html-form"

  )
    .values()
    .map(r => {

      let obj = {};

      columns.forEach(c => {
        obj[c] = r[c] ?? "";
      });

      return obj;

    });

  console.log(rows);

  fetch(GOOGLE_SHEETS_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify(rows)
  })
  .then(() => {
    console.log("Data sent to sheet");
  })
  .catch(error => {
    console.error("Error sending data:", error);
  });

}

function createPracticeBlock(blockName, nTrials, letterSet){
  return createTrials(blockName, nTrials, blockName, letterSet).map(t => {
    return {
      ...t,
      on_finish: function(data) {
        const correctVal = (data.task === "global") ? data.global_letter : data.local_letter;
        
        if (IS_MOBILE) {
          if (data.response === null || data.response === undefined) {
            data.correct = 0;
          } else {
            let chosen = letterSet[parseInt(data.response)];
            data.response = chosen;
            data.correct = (chosen === correctVal) ? 1 : 0;
          }
        } else {
          if (data.response === null) {
            data.correct = 0;
          } else {
            data.correct = (data.response.toUpperCase() === correctVal.toUpperCase()) ? 1 : 0;
          }
        }
        data.practice = true;
      }
    };
  });
}

function getPracticeAccuracy(blockName){
  const d = jsPsych.data.get().filter({practice: true, block: blockName});
  return d.count() === 0 ? 0 : d.select("correct").mean();
}

            (d.trial_type === "html-keyboard-response" ||
             d.trial_type === "html-button-response") &&
            !d.ignore &&
            d.block &&
            !d.practice
          );

          function blockAccuracy(blockName) {
            const blockTrials = trials.filter({ block: blockName });

            if (blockTrials.count() === 0) return "—";

            return Math.round(
              blockTrials.select("correct").mean() * 100
            ) + "%";
          }

          const globalAcc = blockAccuracy("global");
          const localAcc = blockAccuracy("local");
          const mixedAcc = blockAccuracy("mixed");

          const correctTrials = trials.filter({ correct: 1 });

          const meanRT =
            correctTrials.count() > 0

              : 0;

          return `
