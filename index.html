function generateParticipantID() {
  return "NAVON-" + Math.random().toString(36).substring(2, 8).toUpperCase();
}
const PARTICIPANT_ID = generateParticipantID();
const TIMESTAMP = new Date().toISOString();

function getDeviceType() {
  const ua = navigator.userAgent;

  if (/tablet/i.test(ua)) return "tablet";
  if (/mobile/i.test(ua)) return "mobile";
  return "desktop";
}

const DEVICE = getDeviceType();

  function isMobile() {
  return DEVICE === "mobile" || DEVICE === "tablet";
}

  function getTrialPlugin() {
  return isMobile() ? "html-button-response" : "html-keyboard-response";
}

function showMobileButtons(choices) {
  if (!isMobile()) return;

  removeMobileButtons();

  const container = document.createElement("div");
  container.className = "mobile-buttons";
  container.id = "mobile-buttons";

  choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.className = "mobile-btn";
    btn.innerText = choice.toUpperCase();

    btn.addEventListener("click", () => {

      removeMobileButtons();

      jsPsych.finishTrial({
        response: choice,
        rt: performance.now()
      });
    });

    container.appendChild(btn);
  });

  document.body.appendChild(container);
}

function removeMobileButtons() {
  const old = document.getElementById("mobile-buttons");
  if (old) old.remove();
}

function generateNavonHTML(global_letter, local_letter){
  let html = '<div style="display:inline-block;">';
  const template = TEMPLATES[global_letter];
  const colors = ["white", "yellow", "cyan", "magenta", "lime"];

  for(let r=0; r<GRID_SIZE; r++){
    html += '<div>';
    for(let c=0; c<GRID_SIZE; c++){
      if(template[r][c] === 1){
        const color = colors[Math.floor(Math.random()*colors.length)];
        html += `<span class="navon-letter" style="color:${color}">${local_letter}</span>`;
      } else {
        html += `<span class="navon-letter">&nbsp;</span>`;
      }
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

  function createTrials(block_type, n_trials, fixed_task = null, letter_set) {

  const trials = [];

  for (let i = 0; i < n_trials; i++) {

    let task;

    if (block_type === "mixed") {
      task = Math.random() < 0.5 ? "global" : "local";
    } else {
      task = fixed_task ?? block_type;
    }

    let condition = Math.random() < 0.5 ? "congruent" : "incongruent";

    let global_letter, local_letter;

    if (condition === "congruent") {
      global_letter = local_letter = letter_set[Math.floor(Math.random() * letter_set.length)];
    } else {
      const shuffled = [...letter_set].sort(() => Math.random() - 0.5);
      global_letter = shuffled[0];
      local_letter = shuffled[1];
    }

    // cue (mixed only)
    if (block_type === "mixed") {
      trials.push({
        type: "html-keyboard-response",
        stimulus: `<div style="font-size:70px;color:yellow;">
          ${task === "global" ? "↑" : "↓"}
        </div>`,
        choices: jsPsych.NO_KEYS,
        trial_duration: 700,
        data: { ignore: true }
      });
    }
// =========================
// MOBILE VERSION
// =========================
if (DEVICE === "mobile" || DEVICE === "tablet") {

  trials.push({
    type: "html-button-response",

    on_start: function () {
      removeMobileButtons();
    },

    stimulus: `
      <div style="font-size:32px; margin-bottom:20px;">
        ${generateNavonHTML(global_letter, local_letter)}
      </div>
    `,

    choices: letter_set.map(l => l.toUpperCase()),

    button_html: `
      <button class="jspsych-btn" style="
        font-size:28px;
        width:120px;
        height:80px;
        margin:10px;
      ">%choice%</button>
    `,

    response_ends_trial: true,
    trial_duration: 1500,

    data: {
      block: block_type,
      trial: i + 1,
      condition,
      task,
      global_letter,
      local_letter
    },

    on_finish: function (data) {

      const set = letter_set;

      const correctAnswer = data.task === "global"
        ? data.global_letter
        : data.local_letter;

      let resp = "";

      // 🔥 drošs response handling (JSPsych mobile bieži dod string vai index)
      if (typeof data.response === "number") {
        resp = set[data.response];
      } else if (typeof data.response === "string") {
        resp = data.response;
      }

      resp = resp || "";

      data.response = resp;
      data.correct = resp === correctAnswer ? 1 : 0;
    }
  });

} else {

  // =========================
  // DESKTOP VERSION
  // =========================

  trials.push({
    type: "html-keyboard-response",

    stimulus: generateNavonHTML(global_letter, local_letter),

    choices: letter_set.map(l => l.toLowerCase()),

    trial_duration: 1500,
    response_ends_trial: true,

    data: {
      block: block_type,
      trial: i + 1,
      condition,
      task,
      global_letter,
      local_letter
    },

    on_finish: function (data) {

      const correctAnswer =
        data.task === "global"
          ? data.global_letter.toLowerCase()
          : data.local_letter.toLowerCase();

      const resp = data.response ? data.response.toLowerCase() : "";

      data.correct = (resp === correctAnswer) ? 1 : 0;
    }
  });
}

    
  }

  return trials;
}

function saveData() {
  const columns = [
    "participant_id",
    "timestamp",
    "device",

    // demogrāfija
    "age",
    "gender",
    "employment_status",
    "industry",
    "position",
    "occupation",
    "gaming",

    // eksperiments
    "block",
    "trial",
    "condition",
    "task",
    "global_letter",
    "local_letter",
    "response",
    "correct",
    "rt"
  ];

  const rows = jsPsych.data.get()
          .filterCustom(d => 
            d.trial_type === "html-keyboard-response" &&
            !d.ignore &&
            !d.practice
          )
          .values()
          .map(r => {
            let obj = {};
            columns.forEach(c => obj[c] = r[c] ?? "");
            return obj;
          });

  fetch(GOOGLE_SHEETS_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify(rows)
  }).then(() => {
    console.log("Data sent to sheet");
  }).catch(error => {
    console.error("Error sending data:", error);
  });
}

function createPracticeBlock(blockName, nTrials){
  return createTrials(blockName, nTrials, blockName, LETTER_SETS.letters).map(t => ({
    ...t,
    data: {
      ...t.data,
      practice: true
    },
    on_finish: function(data){

  const correctAnswer =
    (data.task === "global")
      ? data.global_letter?.toLowerCase()
      : data.local_letter?.toLowerCase();

  if (!data.response) {
    data.correct = 0;
    data.response = "";
  } else {
    data.correct =
      (data.response.toLowerCase() === correctAnswer) ? 1 : 0;
  }
}
  }));
}

function getPracticeAccuracy(block){
  const d = jsPsych.data.get().filter({practice: true, block: block});
  return d.count() === 0 ? 0 : d.select("correct").mean();
}

      </select>
    </div>
  `,
  button_label: "Turpināt",
  on_finish: function(data){
    jsPsych.data.addProperties({
      gender: data.response.gender
    });
  }
});

timeline.push({
  type: "survey-html-form",
  html: `
    <div class="card">
      <p>Kāds ir Tavs pašreizējais nodarbošanās statuss?</p>

      <select name="employment_status" id="employment_status" required>
        <option value="">Izvēlies</option>
        <option value="employed">Strādā algotu darbu</option>
        <option value="self">Pašnodarbināts / uzņēmējs</option>
        <option value="student">Mācies / skolēns / students</option>
        <option value="unemployed">Meklē darbu</option>
        <option value="parental">Bērna kopšanas atvaļinājumā</option>
        <option value="retired">Pensionārs</option>
        <option value="other">Cits</option>
      </select>

      <div id="industry_block" style="display:none; margin-top:15px;">
        <p>Kādā nozarē Tu darbojies?</p>

        <select name="industry">
          <option value="">Izvēlies</option>
          <option value="it">IT</option>
          <option value="education">Izglītība</option>
          <option value="services">Pakalpojumi</option>
          <option value="healthcare">Veselības aprūpe</option>
          <option value="other">Cits</option>
        </select>
      </div>
    </div>
  `,
  button_label: "Turpināt",

  on_load: function () {
    const select = document.getElementById("employment_status");
    const industryBlock = document.getElementById("industry_block");

    select.addEventListener("change", function () {
      if (this.value === "employed" || this.value === "self") {
        industryBlock.style.display = "block";
      } else {
        industryBlock.style.display = "none";
      }
    });
  },

  on_finish: function(data){
    jsPsych.data.addProperties({
      employment_status: data.response.employment_status,
      industry: data.response.industry || null
    });
  }
});

timeline.push({
  type: "survey-html-form",
  html: `
    <div class="card">
      <p>Cik bieži Tu spēlē videospēles?</p>

      <select name="gaming" required>
        <option value="">Izvēlies</option>
        <option value="never">Nekad</option>
        <option value="rare">Ļoti reti (dažas reizes gadā vai retāk)</option>
        <option value="sometimes">Reizēm (dažas reizes mēnesī)</option>
        <option value="often">Bieži (katru nedēļu vai biežāk)</option>
        <option value="very_often">Ļoti bieži (gandrīz katru dienu)</option>
      </select>
    </div>
  `,
  button_label: "Pabeigt",
  on_finish: function(data){
    jsPsych.data.addProperties({
      gaming: data.response.gaming
    });
  }
});

timeline.push({
  type: "html-keyboard-response",
  stimulus: function () {
    const trials = jsPsych.data.get()
      .filterCustom(d => d.trial_type === "html-keyboard-response" && !d.ignore && d.block && !d.practice);

    function blockAccuracy(blockName) {
      const blockTrials = trials.filter({ block: blockName });
      if (blockTrials.count() === 0) return "—";
      return Math.round(blockTrials.select("correct").mean() * 100) + "%";
    }

    const globalAcc = blockAccuracy("global");
    const localAcc  = blockAccuracy("local");
    const mixedAcc  = blockAccuracy("mixed");
    const meanRT = Math.round(trials.filter({ correct: 1 }).select("rt").mean());

    return `
    <div class="card">
      <h2 class="hint">Paldies par dalību!</h2>
      <h3>Precizitāte pa blokiem</h3>
      <p><strong>Globālais bloks:</strong> ${globalAcc}</p>
      <p><strong>Lokālais bloks:</strong> ${localAcc}</p>
      <p><strong>Jauktais bloks:</strong> ${mixedAcc}</p>
      <p style="margin-top:15px;"><strong>Vidējais reakcijas laiks:</strong> ${meanRT} ms</p>
      </div>
    `;
  },
  on_load: function() {
    saveData();
  },
  choices: jsPsych.NO_KEYS,
  data: { ignore: true }
});

jsPsych.init({
  timeline: timeline
});
</script>
