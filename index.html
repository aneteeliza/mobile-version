function generateNavonHTML(global_letter, local_letter){
  let html = '<div class="navon-container">';
  const template = TEMPLATES[global_letter];
  const colors = ["white", "yellow", "cyan", "magenta", "lime"];
  for(let r=0; r<GRID_SIZE; r++){
    html += '<div style="white-space: nowrap;">';
    for(let c=0; c<GRID_SIZE; c++){
      if(template[r][c] === 1){
        const color = colors[Math.floor(Math.random()*colors.length)];
        html += `<span class="navon-letter" style="color:${color}">${local_letter}</span>`;
      } else {
        html += `<span class="navon-letter">&nbsp;</span>`;
      }
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function instructionScreen(htmlText){
  // Dynamically change instructions tip context based on system agent
  let fixedText = IS_MOBILE 
    ? htmlText.replace("Nospied SPACE, lai turpinātu", "Nospied pogu zemāk, lai turpinātu").replace("Nospied SPACE, lai sāktu", "Nospied pogu zemāk, lai sāktu")
    : htmlText;

  return IS_MOBILE
    ? {
        type: "html-button-response",
        stimulus: fixedText,
        choices: ["TURPINĀT"],
        button_html: `<button class="jspsych-btn mobile-btn" style="margin-top:20px;">%choice%</button>`,
        data: {ignore:true}
      }
    : {
        type: "html-keyboard-response",
        stimulus: fixedText,
        choices: [" "],
        data: {ignore:true}
      };
} 

function createTrials(block_type, n_trials, fixed_task=null, letter_set){
  const trials = [];
  for(let i=0;i<n_trials;i++){
    let task = (block_type === "mixed") ? (Math.random() < 0.5 ? "global" : "local") : (fixed_task ?? block_type);
    let condition = Math.random()<0.5 ? "congruent" : "incongruent";
    let global_letter, local_letter;
    
    if(condition==="congruent"){
      global_letter = local_letter = letter_set[Math.floor(Math.random()*2)];
    } else {
      const shuffled = [...letter_set].sort(()=>Math.random()-0.5);
      global_letter = shuffled[0];
      local_letter  = shuffled[1];
    }
    
    if(block_type==="mixed"){
      const cue = task==="global" ? "↑" : "↓";
      trials.push(
        IS_MOBILE
        ? {
            type: "html-button-response",
            stimulus: `<div style="font-size:80px; color:yellow;">${cue}</div>`,
            choices: [],
            trial_duration: 700,
            data: {ignore:true}
          }
        : {
            type: "html-keyboard-response",
            stimulus: `<div style="font-size:80px; color:yellow;">${cue}</div>`,
            choices: jsPsych.NO_KEYS,
            trial_duration: 700,
            data: {ignore:true}
          }
      );
    }
    
    trials.push(
      IS_MOBILE
      ? {
          type: "html-button-response",
          stimulus: generateNavonHTML(global_letter, local_letter),
          choices: letter_set,
          button_html: `<button class="jspsych-btn mobile-btn">%choice%</button>`,
          trial_duration: 1500,
          data: {block:block_type, trial:i+1, condition, task, global_letter, local_letter},
          on_finish: function(data){
            const correct = (task==="global" ? global_letter : local_letter);
            if (data.response === null || data.response === undefined) {
              data.response = null; 
              data.correct = 0; 
            } else {
              // Convert index (0 or 1) back to the choice value string
              data.response = letter_set[data.response];
              data.correct = (data.response === correct) ? 1 : 0;
            }
          }
        }
      : {
          type: "html-keyboard-response",
          stimulus: generateNavonHTML(global_letter, local_letter),
          choices: letter_set.map(l => l.toLowerCase()),
          trial_duration: 1500,
          data: {block:block_type, trial:i+1, condition, task, global_letter, local_letter},
          on_finish: function(data){
            const correct = (task==="global"?global_letter:local_letter).toLowerCase();
            if (data.response === null) {
              data.correct = 0;
            } else {
              data.correct = (data.response === correct) ? 1 : 0;
            }
          }
        }
    );
  }
  return trials;
}

function saveData() {
  const columns = [
    "participant_id", "timestamp", "device", "age", "gender", 
    "employment_status", "industry", "position", "occupation", "gaming",
    "block", "trial", "condition", "task", "global_letter", "local_letter", 
    "response", "correct", "rt"
  ];
  
  const rows = jsPsych.data.get()
          .filterCustom(d => 
            (d.trial_type === "html-keyboard-response" || d.trial_type === "html-button-response") &&
            !d.ignore &&
            !d.practice
          )
          .values()
          .map(r => {
            let obj = {};
            columns.forEach(c => obj[c] = r[c] ?? "");
            return obj;
          });
          
  fetch(GOOGLE_SHEETS_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(rows)
  }).then(() => {
    console.log("Data sent to sheet");
  }).catch(error => {
    console.error("Error sending data:", error);
  });
}

function createPracticeBlock(blockName, nTrials, letterSet){
  return createTrials(blockName, nTrials, blockName, letterSet).map(t => ({
    ...t,
    data: {
      ...t.data,
      practice: true
    },
    on_finish: function(data){
      const correctAnswer = (data.task === "global") ? data.global_letter : data.local_letter;
      if (!data.response) {
        data.correct = 0;
      } else {
        // String comparison logic matching adjusted runtime data.response
        data.correct = (data.response.toUpperCase() === correctAnswer.toUpperCase()) ? 1 : 0;
      }
    }
  }));
}

function getPracticeAccuracy(block){
  const d = jsPsych.data.get().filter({practice: true, block: block});
  return d.count() === 0 ? 0 : d.select("correct").mean();

  },
  on_finish: function(data){
    jsPsych.data.addProperties({
      employment_status: data.response.employment_status,
      industry: data.response.industry || null
    });
  }
});

timeline.push({
  type: "survey-html-form",
  html: `
    <div class="card">
      <p>Cik bieži Tu spēlē videospēles?</p>
      <select name="gaming" required>
        <option value="">Izvēlies</option>
        <option value="never">Nekad</option>
        <option value="rare">Ļoti reti (dažas reizes gadā vai retāk)</option>
        <option value="sometimes">Reizēm (dažas reizes mēnesī)</option>
        <option value="often">Bieži (katru nedēļu vai biežāk)</option>
        <option value="very_often">Ļoti bieži (gandrīz katru dienu)</option>
      </select>
    </div>
  `,
  button_label: "Pabeigt",
  on_finish: function(data){
    jsPsych.data.addProperties({ gaming: data.response.gaming });
  }
});

timeline.push({
  type: "html-keyboard-response",
  stimulus: function () {
    const trials = jsPsych.data.get()
      .filterCustom(d => (d.trial_type === "html-keyboard-response" || d.trial_type === "html-button-response") && !d.ignore && d.block && !d.practice);
    
    function blockAccuracy(blockName) {
      const blockTrials = trials.filter({ block: blockName });
      if (blockTrials.count() === 0) return "—";
      return Math.round(blockTrials.select("correct").mean() * 100) + "%";
    }
    
    const globalAcc = blockAccuracy("global");
    const localAcc  = blockAccuracy("local");
    const mixedAcc  = blockAccuracy("mixed");
    const meanRT = Math.round(trials.filter({ correct: 1 }).select("rt").mean()) || 0;
    
    return `
    <div class="card">
      <h2 class="hint">Paldies par dalību!</h2>
      <h3>Precizitāte pa blokiem</h3>
      <p><strong>Globālais bloks:</strong> ${globalAcc}</p>
      <p><strong>Lokālais bloks:</strong> ${localAcc}</p>
      <p><strong>Jauktais bloks:</strong> ${mixedAcc}</p>
      <p style="margin-top:15px;"><strong>Vidējais reakcijas laiks:</strong> ${meanRT} ms</p>
    </div>
    `;
  },
  on_load: function() {
    saveData();
  },
  choices: jsPsych.NO_KEYS,
  data: { ignore: true }
});

jsPsych.init({
  timeline: timeline
});
</script>
</body>
